<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login – Darkworkstore</title>
    <link rel="stylesheet" href="css/admin.css" />
  </head>
  <body class="login-page">
    <div class="login-card">
      <h1>Darkworkstore</h1>
      <p class="sub">Darkworkstore control panel. Sign in to continue.</p>
      <div id="loginErr" class="alert error" style="display: none"></div>
      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" autocomplete="username" required />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required />
        </div>
        <button type="submit" class="btn primary" id="btnSubmit">Sign in</button>
      </form>
    </div>
    <script src="js/admin-core.js"></script>
    <script>
      (function () {
        if (window.AdminApp && AdminApp.getToken()) {
          window.location.replace('dashboard.html');
        }
      })();
    </script>
    <script src="js/login.js"></script>
  </body>
</html>
